name: Flake Update — Weekly Monday (all other inputs)

# Runs Mondays at 04:00 UTC. Updates the inputs that are NOT covered by the
# daily workflow: nixpkgs-unstable, home-manager, impermanence, sops-nix,
# proxmox-nixos. Kept weekly (not daily) because nixpkgs-unstable moves fast
# enough that daily bumps regularly land ahead of Hydra's cache — see
# update-flake-lock-daily.yml for the stable-input daily job.

on:
  schedule:
    - cron: '0 4 * * 1'   # Mondays only, 04:00 UTC
  workflow_dispatch:        # Manual trigger: same scope as the Monday schedule

permissions:
  contents: write           # Required to commit and push flake.lock back to main

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update nixpkgs-unstable and other weekly inputs
        run: nix flake update nixpkgs-unstable home-manager impermanence sops-nix proxmox-nixos

      - name: Commit updated flake.lock
        run: |
          if git diff --quiet flake.lock; then
            echo "flake.lock unchanged — nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add flake.lock
          git commit -m "chore: update flake inputs (weekly, all)"
          git push
