name: Update flake inputs

on:
  schedule:
    - cron: '0 4 * * 0,2-6'  # Tue–Sun: stable nixpkgs only (Hydra always keeps up with 26.05)
    - cron: '0 4 * * 1'    # Monday: all inputs including nixpkgs-unstable
  workflow_dispatch:         # Manual trigger: updates all inputs

permissions:
  contents: write           # Required to commit and push flake.lock back to main

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update nixpkgs stable and up
        run: nix flake update nixpkgs up

      - name: Update all other inputs (weekly on Monday or manual)
        if: github.event.schedule == '0 4 * * 1' || github.event_name == 'workflow_dispatch'
        run: nix flake update nixpkgs-unstable home-manager impermanence sops-nix proxmox-nixos vexboard

      - name: Commit updated flake.lock
        run: |
          if git diff --quiet flake.lock; then
            echo "flake.lock unchanged — nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add flake.lock
          git commit -m "chore: update flake inputs"
          git push
