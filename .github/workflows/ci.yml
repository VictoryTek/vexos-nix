name: CI — Nix Flake Validation

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - '.github/docs/**'
      - 'wallpapers/**'
      - 'files/**'
  pull_request:
    branches: [ main ]

# Cancel any in-progress run for the same branch when a new push arrives.
# Prevents multiple long-running eval jobs queuing up behind each other.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write   # Required by cache-nix-action to save Nix store cache

jobs:
  # ── Static checks (no Nix required — fast) ─────────────────────────────────
  lint:
    name: Static checks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Verify hardware-configuration.nix is not tracked in git
        run: |
          if git ls-files hardware-configuration.nix | grep -q .; then
            echo "FAIL: hardware-configuration.nix must not be tracked in git"
            exit 1
          fi
          echo "PASS: hardware-configuration.nix is not tracked"

      - name: Verify system.stateVersion present in all configuration files
        run: |
          failed=()
          for cfg in \
            configuration-desktop.nix \
            configuration-htpc.nix \
            configuration-server.nix \
            configuration-headless-server.nix \
            configuration-stateless.nix \
            configuration-vanilla.nix; do
            if ! grep -q 'system\.stateVersion' "$cfg"; then
              echo "FAIL: system.stateVersion missing from $cfg"
              failed+=("$cfg")
            else
              echo "PASS: system.stateVersion present in $cfg"
            fi
          done
          if [ ${#failed[@]} -gt 0 ]; then
            exit 1
          fi

  # ── Parallel config evaluation (6 groups × ~5 min each) ────────────────────
  # Each group runs on its own runner in parallel instead of all 30 configs
  # running sequentially on one runner for 20+ minutes.
  # nix eval ... .drvPath forces full evaluation (including all NixOS assertions)
  # without building any packages — equivalent to nix flake check --no-build.
  evaluate:
    name: Evaluate ${{ matrix.group }} configs
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false   # Run all groups even if one fails
      matrix:
        include:
          - group: desktop
            configs: >-
              vexos-desktop-amd
              vexos-desktop-nvidia
              vexos-desktop-nvidia-legacy535
              vexos-desktop-vm
              vexos-desktop-intel
          - group: stateless
            configs: >-
              vexos-stateless-amd
              vexos-stateless-nvidia
              vexos-stateless-nvidia-legacy535
              vexos-stateless-intel
              vexos-stateless-vm
          - group: server
            configs: >-
              vexos-server-amd
              vexos-server-nvidia
              vexos-server-nvidia-legacy535
              vexos-server-intel
              vexos-server-vm
          - group: headless-server
            configs: >-
              vexos-headless-server-amd
              vexos-headless-server-nvidia
              vexos-headless-server-nvidia-legacy535
              vexos-headless-server-intel
              vexos-headless-server-vm
          - group: htpc
            configs: >-
              vexos-htpc-amd
              vexos-htpc-nvidia
              vexos-htpc-nvidia-legacy535
              vexos-htpc-intel
              vexos-htpc-vm
          - group: vanilla
            configs: >-
              vexos-vanilla-amd
              vexos-vanilla-nvidia
              vexos-vanilla-nvidia-legacy535
              vexos-vanilla-intel
              vexos-vanilla-vm
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf \
            /usr/local/lib/android \
            /usr/share/dotnet \
            /opt/ghc \
            /usr/local/.ghcup \
            /opt/hostedtoolcache/CodeQL \
            "$AGENT_TOOLSDIRECTORY" || true
          df -h /

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          # Per-group primary key; restore-prefix falls back to any warmed cache
          # from a prior run of any group — nixpkgs store paths are shared.
          primary-key: nix-${{ runner.os }}-${{ matrix.group }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 8G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-last-accessed: P7D
          purge-primary-key: never

      - name: Create stub hardware-configuration.nix for CI
        run: |
          sudo mkdir -p /etc/nixos
          sudo tee /etc/nixos/hardware-configuration.nix << 'EOF'
          { lib, ... }:
          {
            fileSystems."/" = {
              device = lib.mkDefault "/dev/sda1";
              fsType = lib.mkDefault "ext4";
            };
            boot.loader.grub.device = lib.mkDefault "/dev/sda";
            # CI eval fixture only: satisfies zfs-server.nix's assertion that
            # networking.hostId isn't one of the committed placeholder values
            # (hosts/{server,headless-server}-*.nix). Plain priority beats both
            # the host files' mkDefault and zfs-server.nix's mkOverride 1500
            # fallback, so this applies uniformly across every matrix group
            # without needing a per-group conditional step.
            networking.hostId = "cafebabe";
          }
          EOF

      - name: Create CI-only stateless password override fixture
        if: matrix.group == 'stateless'
        run: |
          # CI eval fixture only: this mirrors first-boot provisioning behavior
          # for stateless hosts so assertions evaluate as in production installs.
          temp_hash="$(openssl passwd -6 "$(openssl rand -base64 24)")"
          sudo tee /etc/nixos/stateless-user-override.nix << EOF
          { lib, ... }:
          {
            users.users.nimda.hashedPassword = lib.mkOverride 50 "${temp_hash}";
          }
          EOF

      - name: Evaluate ${{ matrix.group }} configurations
        # Evaluate each config's system derivation path — forces full Nix
        # evaluation including all module assertions without building packages.
        # Per-config timeout of 12 minutes ensures a hung eval fails cleanly.
        # nvidia-legacy535/470 configs evaluate slower on GitHub Actions runners
        # due to the larger NVIDIA driver closure — 8m was too tight.
        run: |
          failed=()
          for config in ${{ matrix.configs }}; do
            echo "::group::${config}"
            if timeout 12m nix eval --impure \
                ".#nixosConfigurations.${config}.config.system.build.toplevel.drvPath" \
                > /dev/null; then
              echo "PASS: ${config}"
            else
              echo "FAIL: ${config}"
              failed+=("${config}")
            fi
            echo "::endgroup::"
          done
          if [ ${#failed[@]} -gt 0 ]; then
            echo "Failed: ${failed[*]}"
            exit 1
          fi
