name: CI — Nix Flake Validation

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - '.github/docs/**'
      - 'wallpapers/**'
      - 'files/**'
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  actions: write   # Required by cache-nix-action to save Nix store cache

jobs:
  flake-check:
    name: Evaluate all NixOS configurations
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Free disk space
        # GitHub's ubuntu-latest runners ship with ~14 GB free; evaluating
        # all nixpkgs-backed configurations quickly exhausts it.  Remove large
        # pre-installed toolchains that are unused by this job.
        run: |
          sudo rm -rf \
            /usr/local/lib/android \
            /usr/share/dotnet \
            /opt/ghc \
            /usr/local/.ghcup \
            /opt/hostedtoolcache/CodeQL \
            "$AGENT_TOOLSDIRECTORY" || true
          df -h /

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          # Supplies GITHUB_TOKEN to the Nix daemon to avoid API rate limits
          # when fetching flake inputs (nixpkgs, nix-gaming, home-manager, etc.)
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Nix store
        uses: nix-community/cache-nix-action@v6
        with:
          # Key includes flake.lock hash — cache is invalidated on any input change
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          # Fall back to any previous cache for this OS to get a warm store
          restore-prefixes-first-match: nix-${{ runner.os }}-
          # Cap store size before saving to stay within GitHub's 10 GiB cache limit
          gc-max-store-size-linux: 8589934592  # 8 GiB

      - name: Create stub hardware-configuration.nix for CI
        run: |
          # This stub satisfies the flake's commonModules import of
          # /etc/nixos/hardware-configuration.nix without asserting any
          # hardware config.  It is NOT deployed to any host.
          sudo mkdir -p /etc/nixos
          sudo tee /etc/nixos/hardware-configuration.nix << 'EOF'
          { lib, ... }:
          {
            # CI stub — satisfies NixOS assertions for non-hardware builds
            # Uses lib.mkDefault so module-defined options always win
            fileSystems."/" = {
              device = lib.mkDefault "/dev/sda1";
              fsType = lib.mkDefault "ext4";
            };
            boot.loader.grub.device = lib.mkDefault "/dev/sda";
          }
          EOF

      - name: nix flake check — evaluate all configurations (no build)
        # --no-build: evaluate derivations without building packages
        # --impure:   allow access to /etc/nixos/hardware-configuration.nix
        # --show-trace is intentionally omitted: it produces traces so large
        # that GitHub Actions truncates them before the actual error is visible.
        # timeout 25m: hard-kill nix if it hangs, producing a clean failure
        # instead of silently blocking until the job timeout kills the runner.
        run: timeout 25m nix flake check --no-build --impure

      - name: Verify hardware-configuration.nix is not tracked in git
        run: |
          if git ls-files hardware-configuration.nix | grep -q .; then
            echo "FAIL: hardware-configuration.nix must not be tracked in git"
            exit 1
          fi
          echo "PASS: hardware-configuration.nix is not tracked"

      - name: Verify system.stateVersion present in configuration.nix
        run: |
          if ! grep -q 'system\.stateVersion' configuration.nix; then
            echo "FAIL: system.stateVersion missing from configuration.nix"
            exit 1
          fi
          echo "PASS: system.stateVersion is present"
